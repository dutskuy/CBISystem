[phases.setup]
# Menambahkan nodejs agar bisa menjalankan npm, dan memperbaiki penamaan composer
nixPkgs = [
    "php82", 
    "php82Extensions.pdo_mysql", 
    "php82Extensions.mbstring", 
    "php82Extensions.xml", 
    "php82Extensions.curl", 
    "php82Extensions.zip", 
    "php82Extensions.gd", 
    "php82Packages.composer",
    "nodejs"
]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm install",
    "npm run build"
]

[start]
# Menghapus config:clear di awal karena config:cache sudah mencakup pembersihan.
# Saran: Gunakan 'migrate --force' daripada 'migrate:fresh' jika tidak ingin data terhapus otomatis.
cmd = "php artisan migrate --force && php artisan storage:link --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan serve --host=0.0.0.0 --port=$PORT"